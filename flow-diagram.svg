<svg width="680" height="560" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Rebuy Links request flow</title>
<desc>Two flows: shortening a URL through the controller, service, and database with a uniqueness check; and following a short link through Redis cache before falling back to Postgres, then recording the click.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#444441" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<style>
text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
.th { font-size: 14px; font-weight: 500; }
.ts { font-size: 12px; }
.box { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
.gray-text { fill: #2C2C2A; }
.purple { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
.purple-text { fill: #26215C; }
.purple-sub { fill: #3C3489; }
.teal { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
.teal-text { fill: #04342C; }
.teal-sub { fill: #085041; }
.coral { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
.coral-text { fill: #4A1B0C; }
.coral-sub { fill: #712B13; }
.gray-sub { fill: #444441; }
</style>

<rect width="680" height="560" fill="#ffffff"/>

<text class="th gray-text" x="40" y="34">Shortening a URL</text>

<rect class="box" x="40" y="50" width="130" height="56" rx="8"/>
<text class="th gray-text" x="105" y="68" text-anchor="middle" dominant-baseline="central">Client</text>
<text class="ts gray-sub" x="105" y="86" text-anchor="middle" dominant-baseline="central">POST /api/shorten</text>

<line x1="170" y1="78" x2="208" y2="78" stroke="#444441" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect class="purple" x="210" y="50" width="130" height="56" rx="8"/>
<text class="th purple-text" x="275" y="68" text-anchor="middle" dominant-baseline="central">Rate limiter</text>
<text class="ts purple-sub" x="275" y="86" text-anchor="middle" dominant-baseline="central">10 req/min per IP</text>

<line x1="340" y1="78" x2="378" y2="78" stroke="#444441" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect class="purple" x="380" y="50" width="140" height="56" rx="8"/>
<text class="th purple-text" x="450" y="68" text-anchor="middle" dominant-baseline="central">Shorten service</text>
<text class="ts purple-sub" x="450" y="86" text-anchor="middle" dominant-baseline="central">checks idempotency</text>

<line x1="450" y1="106" x2="450" y2="144" stroke="#444441" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect class="teal" x="370" y="146" width="160" height="56" rx="8"/>
<text class="th teal-text" x="450" y="164" text-anchor="middle" dominant-baseline="central">PostgreSQL</text>
<text class="ts teal-sub" x="450" y="182" text-anchor="middle" dominant-baseline="central">save + unique constraint</text>

<line x1="370" y1="174" x2="220" y2="174" stroke="#444441" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect class="coral" x="60" y="146" width="160" height="56" rx="8"/>
<text class="th coral-text" x="140" y="164" text-anchor="middle" dominant-baseline="central">Hash generator</text>
<text class="ts coral-sub" x="140" y="182" text-anchor="middle" dominant-baseline="central">retry on collision</text>

<line x1="450" y1="202" x2="450" y2="240" stroke="#444441" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect class="box" x="380" y="242" width="140" height="44" rx="8"/>
<text class="th gray-text" x="450" y="264" text-anchor="middle" dominant-baseline="central">201 Created</text>

<line x1="40" y1="330" x2="640" y2="330" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 4"/>

<text class="th gray-text" x="40" y="364">Following a short link</text>

<rect class="box" x="40" y="380" width="120" height="56" rx="8"/>
<text class="th gray-text" x="100" y="398" text-anchor="middle" dominant-baseline="central">Client</text>
<text class="ts gray-sub" x="100" y="416" text-anchor="middle" dominant-baseline="central">GET /{hash}</text>

<line x1="160" y1="408" x2="198" y2="408" stroke="#444441" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect class="teal" x="200" y="380" width="130" height="56" rx="8"/>
<text class="th teal-text" x="265" y="398" text-anchor="middle" dominant-baseline="central">Redis cache</text>
<text class="ts teal-sub" x="265" y="416" text-anchor="middle" dominant-baseline="central">cache hit, most clicks</text>

<path d="M330 408 L 368 408 L 368 380 L 480 380" fill="none" stroke="#444441" stroke-width="0.5" marker-end="url(#arrow)"/>
<text class="ts gray-sub" x="395" y="372" text-anchor="middle">cache miss</text>

<rect class="coral" x="480" y="380" width="140" height="56" rx="8"/>
<text class="th coral-text" x="550" y="398" text-anchor="middle" dominant-baseline="central">PostgreSQL</text>
<text class="ts coral-sub" x="550" y="416" text-anchor="middle" dominant-baseline="central">resolve + populate cache</text>

<line x1="265" y1="436" x2="265" y2="474" stroke="#444441" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="550" y1="436" x2="265" y2="474" fill="none" stroke="#444441" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect class="purple" x="195" y="476" width="140" height="44" rx="8"/>
<text class="th purple-text" x="265" y="498" text-anchor="middle" dominant-baseline="central">Record access</text>

<line x1="335" y1="498" x2="380" y2="498" stroke="#444441" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect class="box" x="382" y="470" width="160" height="56" rx="8"/>
<text class="th gray-text" x="462" y="488" text-anchor="middle" dominant-baseline="central">302 Found</text>
<text class="ts gray-sub" x="462" y="506" text-anchor="middle" dominant-baseline="central">Location: original URL</text>

</svg>
