<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rebuy Links — URL Shortener</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          --bg:       #0d0d0f;
          --surface:  #16161a;
          --border:   #2a2a32;
          --accent:   #7c3aed;
          --accent2:  #a855f7;
          --text:     #e8e8f0;
          --muted:    #6b6b80;
          --success:  #22c55e;
          --error:    #ef4444;
          --radius:   12px;
        }

        body {
          background: var(--bg);
          color: var(--text);
          font-family: 'Inter', system-ui, sans-serif;
          min-height: 100vh;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          padding: 24px;
        }

        /* LOGO */
        .logo {
          display: flex;
          align-items: center;
          gap: 10px;
          margin-bottom: 40px;
        }
        .logo-icon {
          width: 40px; height: 40px;
          background: linear-gradient(135deg, var(--accent), var(--accent2));
          border-radius: 10px;
          display: flex; align-items: center;
          justify-content: center;
          font-size: 20px;
        }
        .logo-text {
          font-size: 22px;
          font-weight: 700;
          letter-spacing: -0.5px;
        }
        .logo-text span { color: var(--accent2); }

        /* CARD */
        .card {
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: 20px;
          padding: 40px;
          width: 100%;
          max-width: 560px;
        }
        .card-title {
          font-size: 26px;
          font-weight: 700;
          letter-spacing: -0.8px;
          margin-bottom: 8px;
        }
        .card-sub {
          color: var(--muted);
          font-size: 14px;
          margin-bottom: 28px;
          line-height: 1.5;
        }

        /* INPUT */
        .url-input {
          width: 100%;
          background: var(--bg);
          border: 1.5px solid var(--border);
          border-radius: var(--radius);
          color: var(--text);
          font-size: 15px;
          padding: 16px 20px;
          outline: none;
          transition: border-color 0.2s;
        }
        .url-input::placeholder { color: var(--muted); }
        .url-input:focus { border-color: var(--accent); }
        .url-input.error { border-color: var(--error); }

        .error-msg {
          color: var(--error);
          font-size: 13px;
          margin-top: 8px;
          display: none;
        }
        .error-msg.show { display: block; }

        /* BUTTON */
        .btn {
          width: 100%;
          margin-top: 14px;
          padding: 16px;
          background: linear-gradient(135deg, var(--accent), var(--accent2));
          border: none;
          border-radius: var(--radius);
          color: #fff;
          font-size: 15px;
          font-weight: 600;
          cursor: pointer;
          transition: opacity 0.2s, transform 0.1s;
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 8px;
        }
        .btn:hover { opacity: 0.9; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* RESULT */
        .result {
          display: none;
          margin-top: 24px;
          padding: 20px;
          background: var(--bg);
          border: 1.5px solid var(--border);
          border-radius: var(--radius);
          animation: slideUp 0.3s ease;
        }
        .result.show { display: block; }

        @keyframes slideUp {
          from { opacity: 0; transform: translateY(8px); }
          to   { opacity: 1; transform: translateY(0); }
        }

        .result-label {
          color: var(--muted);
          font-size: 11px;
          text-transform: uppercase;
          letter-spacing: 0.8px;
          margin-bottom: 10px;
        }
        .result-row {
          display: flex;
          align-items: center;
          gap: 10px;
        }
        .result-url {
          flex: 1;
          color: var(--accent2);
          font-size: 18px;
          font-weight: 600;
          text-decoration: none;
          word-break: break-all;
        }
        .result-url:hover { text-decoration: underline; }

        .copy-btn {
          flex-shrink: 0;
          padding: 8px 16px;
          background: transparent;
          border: 1.5px solid var(--border);
          border-radius: 8px;
          color: var(--text);
          font-size: 13px;
          font-weight: 500;
          cursor: pointer;
          transition: border-color 0.2s, color 0.2s;
        }
        .copy-btn:hover { border-color: var(--accent2); color: var(--accent2); }
        .copy-btn.copied { border-color: var(--success); color: var(--success); }

        .original-preview {
          margin-top: 12px;
          padding-top: 12px;
          border-top: 1px solid var(--border);
          font-size: 12px;
          color: var(--muted);
          word-break: break-all;
        }

        /* STATS */
        .stats-row {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 12px;
          margin-top: 16px;
        }
        .stat-box {
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: 10px;
          padding: 14px;
          text-align: center;
          transition: border-color 0.2s;
        }
        .stat-box.clickable {
          cursor: pointer;
        }
        .stat-box.clickable:hover {
          border-color: var(--accent2);
        }
        .stat-value {
          font-size: 20px;
          font-weight: 700;
          color: var(--accent2);
          transition: color 0.3s;
        }
        .stat-value.updated {
          color: var(--success);
        }
        .stat-label {
          font-size: 11px;
          color: var(--muted);
          margin-top: 2px;
          text-transform: uppercase;
          letter-spacing: 0.5px;
        }

        /* HISTORY */
        .history {
          width: 100%;
          max-width: 560px;
          margin-top: 20px;
        }
        .history-title {
          font-size: 12px;
          color: var(--muted);
          margin-bottom: 10px;
          text-transform: uppercase;
          letter-spacing: 0.8px;
        }
        .history-item {
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: 10px;
          padding: 14px 16px;
          margin-bottom: 8px;
          display: flex;
          align-items: center;
          gap: 12px;
          animation: slideUp 0.2s ease;
        }
        .history-main {
          flex: 1;
          min-width: 0;
          display: flex;
          flex-direction: column;
          gap: 2px;
        }
        .history-short {
          color: var(--accent2);
          font-weight: 600;
          font-size: 14px;
          text-decoration: none;
        }
        .history-original {
          color: var(--muted);
          font-size: 12px;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }
        .history-clicks {
          flex-shrink: 0;
          font-size: 12px;
          font-weight: 600;
          color: var(--accent2);
          background: var(--bg);
          border: 1px solid var(--border);
          border-radius: 6px;
          padding: 4px 10px;
          white-space: nowrap;
          min-width: 64px;
          text-align: center;
        }
        .history-copy {
          flex-shrink: 0;
          background: none;
          border: none;
          color: var(--muted);
          cursor: pointer;
          font-size: 16px;
          padding: 4px;
          transition: color 0.2s;
        }
        .history-copy:hover { color: var(--accent2); }

        /* SPINNER */
        .spinner {
          width: 18px; height: 18px;
          border: 2px solid rgba(255,255,255,0.3);
          border-top-color: white;
          border-radius: 50%;
          animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* REFRESH INDICATOR */
        .refresh-hint {
          font-size: 10px;
          color: var(--muted);
          margin-top: 4px;
        }

        footer {
          margin-top: 40px;
          color: var(--muted);
          font-size: 12px;
        }

        @media (max-width: 600px) {
          .card { padding: 24px 16px; }
          .card-title { font-size: 20px; }
          .stats-row { grid-template-columns: 1fr; }
          .history-item { flex-wrap: wrap; }
        }
    </style>
</head>
<body>

<div class="logo">
    <div class="logo-icon">🔗</div>
    <div class="logo-text">Rebuy <span>Links</span></div>
</div>

<div class="card">
    <h1 class="card-title">Shorten any URL</h1>
    <p class="card-sub">
        Paste a long product link and get a clean 4-character
        short URL — perfect for SMS and email campaigns.
    </p>

    <input
            type="url"
            id="urlInput"
            class="url-input"
            placeholder="https://your-long-product-url.com/..."
            autocomplete="off"
            spellcheck="false"
    />
    <div class="error-msg" id="errorMsg"></div>

    <button class="btn" id="shortenBtn" onclick="shorten()">
        <span id="btnText">Shorten URL</span>
    </button>

    <div class="result" id="result">
        <div class="result-label">Your short link</div>
        <div class="result-row">
            <a class="result-url" id="resultUrl"
               href="#" target="_blank"></a>
            <button class="copy-btn" id="copyBtn" onclick="copyUrl()">
                Copy
            </button>
        </div>
        <div class="original-preview" id="originalPreview"></div>

        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-value" id="statHash">—</div>
                <div class="stat-label">Hash Code</div>
            </div>
            <div class="stat-box clickable" onclick="refreshStats()"
                 title="Click to refresh">
                <div class="stat-value" id="statClicks">0</div>
                <div class="stat-label">
                    Total Clicks
                    <span style="margin-left:4px">🔄</span>
                </div>
                <div class="refresh-hint">auto-refreshes every 5s</div>
            </div>
        </div>
    </div>
</div>

<div class="history" id="historySection" style="display:none">
    <div class="history-title">Recent Links</div>
    <div id="historyList"></div>
</div>

<footer>Built by Rebuy Engineering · URL Shortener MVP</footer>

<script>
    // Load from localStorage so links survive page refresh
    const recentLinks = JSON.parse(
      localStorage.getItem('recentLinks') || '[]'
    );

    let currentShortUrl = '';
    let currentHash = '';
    let statsInterval = null;
    let historyRefreshInterval = null;

    // Show existing links on page load
    if (recentLinks.length > 0) {
      renderHistory();
      startHistoryAutoRefresh();
    }

    function setLoading(loading) {
      const btn = document.getElementById('shortenBtn');
      const btnText = document.getElementById('btnText');
      btn.disabled = loading;
      btnText.innerHTML = loading
        ? '<div class="spinner"></div>'
        : 'Shorten URL';
    }

    function showError(msg) {
      document.getElementById('urlInput').classList.add('error');
      const err = document.getElementById('errorMsg');
      err.textContent = msg;
      err.classList.add('show');
    }

    function clearError() {
      document.getElementById('urlInput').classList.remove('error');
      document.getElementById('errorMsg').classList.remove('show');
    }

    function isValidUrl(url) {
      try {
        const u = new URL(url);
        return u.protocol === 'http:' || u.protocol === 'https:';
      } catch { return false; }
    }

    async function shorten() {
      clearError();
      const input = document.getElementById('urlInput');
      const url = input.value.trim();

      if (!url) {
        showError('Please enter a URL.');
        return;
      }
      if (!isValidUrl(url)) {
        showError(
          'Please enter a valid URL starting with http:// or https://'
        );
        return;
      }

      setLoading(true);
      try {
        const res = await fetch('/api/shorten', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.message || 'Something went wrong.');
          return;
        }

        showResult(data);
        addToHistory(data);
        input.value = '';

      } catch (e) {
        showError('Network error. Please check your connection.');
      } finally {
        setLoading(false);
      }
    }

    function showResult(data) {
      currentHash = data.hash;
      currentShortUrl = data.shortUrl;

      document.getElementById('resultUrl').textContent = data.shortUrl;
      document.getElementById('resultUrl').href = data.shortUrl;
      document.getElementById('originalPreview').textContent =
        '→ ' + data.originalUrl;
      document.getElementById('statHash').textContent = data.hash;
      document.getElementById('statClicks').textContent = '...';

      const copyBtn = document.getElementById('copyBtn');
      copyBtn.textContent = 'Copy';
      copyBtn.classList.remove('copied');

      document.getElementById('result').classList.add('show');

      // Fetch real click count immediately
      fetchStats(data.hash);

      // Auto refresh every 5 seconds
      if (statsInterval) clearInterval(statsInterval);
      statsInterval = setInterval(() => {
        fetchStats(currentHash);
      }, 5000);
    }

    async function fetchStats(hash) {
      try {
        const res = await fetch('/api/stats/' + hash);
        if (res.ok) {
          const stats = await res.json();
          const el = document.getElementById('statClicks');
          const oldVal = parseInt(el.textContent) || 0;
          const newVal = stats.accessCount;

          el.textContent = newVal;

          // Flash green when count increases
          if (newVal > oldVal) {
            el.classList.add('updated');
            setTimeout(() => el.classList.remove('updated'), 1000);
          }
        }
      } catch (e) {
        console.log('Stats fetch failed:', e);
      }
    }

    async function refreshStats() {
      if (!currentHash) return;
      const el = document.getElementById('statClicks');
      el.textContent = '...';
      await fetchStats(currentHash);
    }

    function copyUrl() {
      navigator.clipboard.writeText(currentShortUrl).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy';
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    function addToHistory(data) {
      // Remove duplicate if same URL shortened again
      const existing = recentLinks.findIndex(
        l => l.shortUrl === data.shortUrl
      );
      if (existing > -1) recentLinks.splice(existing, 1);

      recentLinks.unshift(data);
      if (recentLinks.length > 5) recentLinks.pop();

      // Save to localStorage — survives page refresh
      localStorage.setItem(
        'recentLinks', JSON.stringify(recentLinks)
      );
      renderHistory();
      startHistoryAutoRefresh();
    }

    function renderHistory() {
      const section = document.getElementById('historySection');
      const list = document.getElementById('historyList');
      if (recentLinks.length === 0) {
        section.style.display = 'none';
        return;
      }
      section.style.display = 'block';
      list.innerHTML = '';

      recentLinks.forEach(item => {
        const div = document.createElement('div');
        div.className = 'history-item';
        div.innerHTML = `
          <div class="history-main">
            <a class="history-short"
               href="${item.shortUrl}"
               target="_blank">${item.shortUrl}</a>
            <span class="history-original">${item.originalUrl}</span>
          </div>
          <span class="history-clicks" id="clicks-${item.hash}">...</span>
          <button class="history-copy"
                  onclick="copyText('${item.shortUrl}', this)"
                  title="Copy">⎘</button>
        `;
        list.appendChild(div);
      });

      // Fetch live click counts for every link in the list
      refreshAllHistoryClicks();
    }

    function refreshAllHistoryClicks() {
      recentLinks.forEach(item => {
        fetch('/api/stats/' + item.hash)
          .then(res => res.ok ? res.json() : null)
          .then(stats => {
            const el = document.getElementById('clicks-' + item.hash);
            if (el && stats) {
              el.textContent = stats.accessCount + (stats.accessCount === 1 ? ' click' : ' clicks');
            }
          })
          .catch(() => {});
      });
    }

    function startHistoryAutoRefresh() {
      if (historyRefreshInterval) clearInterval(historyRefreshInterval);
      historyRefreshInterval = setInterval(refreshAllHistoryClicks, 5000);
    }

    function copyText(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '✓';
        setTimeout(() => btn.textContent = '⎘', 1500);
      });
    }

    // Enter key support
    document.getElementById('urlInput')
      .addEventListener('keydown', e => {
        if (e.key === 'Enter') shorten();
      });

    // Clear error on typing
    document.getElementById('urlInput')
      .addEventListener('input', clearError);
</script>
</body>
</html>
